<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>访问日志</title>
    <link rel="stylesheet" href="../assets/css/styles.css?v=20260407a" />
  </head>
  <body>
    <header class="topbar">
      <div class="topbar-main">
        <h1>访问日志</h1>
        <nav class="topbar-links">
          <a href="../index.html" target="_blank" rel="noopener noreferrer">返回主页</a>
          <a href="./business-logs.html" target="_blank" rel="noopener noreferrer">业务日志</a>
        </nav>
      </div>
    </header>

    <main class="layout">
      <section class="card">
        <h2>筛选条件</h2>
        <div class="field-grid three-col">
          <label>
            开始时间
            <input id="sinceFilter" type="datetime-local" />
          </label>
          <label>
            结束时间
            <input id="untilFilter" type="datetime-local" />
          </label>
          <label>
            IP
            <input id="ipFilter" type="text" placeholder="例如：1.2.3.4" />
          </label>
          <label>
            方法
            <select id="methodFilter">
              <option value="">全部</option>
              <option value="GET">GET</option>
              <option value="POST">POST</option>
              <option value="PUT">PUT</option>
              <option value="PATCH">PATCH</option>
              <option value="DELETE">DELETE</option>
            </select>
          </label>
          <label>
            路径关键字
            <input id="pathKeywordFilter" type="text" placeholder="例如：/api/v1/enrollments" />
          </label>
          <label>
            状态码
            <input id="statusCodeFilter" type="number" min="100" max="599" placeholder="例如：200" />
          </label>
          <label>
            每页条数
            <select id="pageSizeFilter">
              <option value="20">20</option>
              <option value="50">50</option>
              <option value="100">100</option>
            </select>
          </label>
        </div>
        <div class="actions">
          <button id="refreshBtn" type="button">查询</button>
        </div>
      </section>

      <section class="card">
        <h2>访问记录</h2>
        <div id="accessPagination" class="pagination"></div>
        <div id="accessTableWrap" class="log-table-wrap">加载中...</div>
      </section>
    </main>

    <script src="../assets/js/system-access-logs.js?v=20260407a"></script>
  </body>
</html>
