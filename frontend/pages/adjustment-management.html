<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>报名调整管理</title>
    <link rel="stylesheet" href="../assets/css/styles.css?v=20260402a" />
  </head>
  <body>
    <header class="topbar">
      <div class="topbar-main">
        <h1>报名调整管理</h1>
        <nav class="topbar-links">
          <a href="../index.html" target="_blank" rel="noopener noreferrer">返回主页</a>
          <a href="./enrollments.html" target="_blank" rel="noopener noreferrer">报名管理</a>
          <a href="./refunds.html" target="_blank" rel="noopener noreferrer">报名调整</a>
          <a href="./accommodations.html" target="_blank" rel="noopener noreferrer">住宿报名</a>
          <a href="./old-students.html" target="_blank" rel="noopener noreferrer">老生管理</a>
        </nav>
      </div>
      <div class="operator-box">
        <label for="operator">操作员</label>
        <select id="operator">
          <option value="">加载中...</option>
        </select>
        <label for="source">来源</label>
        <select id="source">
          <option value="">加载中...</option>
        </select>
      </div>
    </header>

    <main class="layout">
      <section class="card">
        <h2>筛选条件 <a href="./enrollment-stats.html" target="_blank" rel="noopener noreferrer" style="margin-left: 10px;">查看报名统计</a></h2>
        <div class="field-grid three-col">
          <label>
            关键词
            <input id="keyword" type="text" placeholder="姓名/报名ID/退费ID" />
          </label>
          <label>
            类型
            <select id="taskType">
              <option value="">全部</option>
              <option value="increase">待补交确认</option>
              <option value="decrease">待退费确认</option>
            </select>
          </label>
          <label>
            状态
            <select id="taskStatus">
              <option value="">全部</option>
              <option value="pending">未调整</option>
              <option value="confirmed">已调整</option>
            </select>
          </label>
        </div>
        <div class="actions">
          <button id="refreshBtn" type="button">刷新列表</button>
        </div>
      </section>

      <section class="card">
        <h2>调整记录列表</h2>
        <div id="taskSummary" class="enrollment-meta">加载中...</div>
        <div id="taskList">加载中...</div>
      </section>
    </main>

    <script src="../assets/js/adjustment-management.js?v=20260402b"></script>
  </body>
</html>
