<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>住宿报价确认</title>
    <link rel="stylesheet" href="../assets/css/styles.css?v=20260331c" />
  </head>
  <body>
    <header class="topbar">
      <div class="topbar-main">
        <h1>住宿报价确认</h1>
        <nav class="topbar-links">
          <a href="../index.html" target="_blank" rel="noopener noreferrer">返回主页</a>
          <a href="./enrollments.html" target="_blank" rel="noopener noreferrer">报价管理</a>
          <a href="./accommodations.html" target="_blank" rel="noopener noreferrer">住宿报名</a>
          <a href="./refunds.html" target="_blank" rel="noopener noreferrer">报名调整</a>
          <a href="./old-students.html" target="_blank" rel="noopener noreferrer">老生管理</a>
        </nav>
      </div>
      <div class="operator-box">
        <label for="operator">操作员</label>
        <select id="operator">
          <option value="">加载中...</option>
        </select>
        <label for="source">来源</label>
        <select id="source">
          <option value="">加载中...</option>
        </select>
      </div>
    </header>

    <main class="layout">
      <section class="card">
        <h2>筛选条件 <a href="./accommodation-stats.html" target="_blank" style="margin-left: 10px;">查看住宿统计</a></h2>
        <div class="field-grid three-col">
          <label>
            关键词
            <input id="keywordFilter" type="text" placeholder="学生姓名/住宿单ID/课程报价单ID" />
          </label>
          <label>
            状态
            <select id="statusFilter">
              <option value="" selected>全部</option>
              <option value="generated">已生成</option>
              <option value="confirmed">已确认</option>
              <option value="cancelled">已取消</option>
            </select>
          </label>
          <label>
            酒店
            <select id="hotelFilter">
              <option value="">全部酒店</option>
            </select>
          </label>
        </div>
        <div class="actions">
          <button id="refreshBtn" type="button">刷新列表</button>
        </div>
      </section>

      <section class="card">
        <h2>住宿报价列表</h2>
        <div id="accommodationPagination" class="pagination"></div>
        <div id="accommodationList">加载中...</div>
      </section>
    </main>

    <script src="../assets/js/accommodation-management.js?v=20260331c"></script>
  </body>
</html>
