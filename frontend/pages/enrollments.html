<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>报名管理</title>
    <link rel="stylesheet" href="../assets/css/styles.css?v=20260331c" />
  </head>
  <body>
    <header class="topbar">
      <div class="topbar-main">
        <h1>报名管理</h1>
        <nav class="topbar-links">
          <a href="../index.html" target="_blank" rel="noopener noreferrer">返回主页</a>
          <a href="./accommodations.html" target="_blank" rel="noopener noreferrer">住宿报名</a>
          <a href="./accommodation-management.html" target="_blank" rel="noopener noreferrer">住宿管理</a>
          <a href="./refunds.html" target="_blank" rel="noopener noreferrer">报名调整</a>
          <a href="./old-students.html" target="_blank" rel="noopener noreferrer">老生管理</a>
        </nav>
      </div>
      <div class="operator-box">
        <label for="operator">操作员</label>
        <select id="operator">
          <option value="">加载中...</option>
        </select>
        <label for="source">来源</label>
        <select id="source">
          <option value="">加载中...</option>
        </select>
      </div>
    </header>

    <main class="layout">
      <section class="card">
        <h2>筛选条件</h2>
        <div class="field-grid three-col">
          <label>
            学生姓名
            <input id="studentNameFilter" type="text" placeholder="请输入学生姓名" />
          </label>
          <label>
            年级
            <select id="gradeFilter">
              <option value="">全部年级</option>
            </select>
          </label>
          <label>
            状态
            <select id="statusFilter">
              <option value="">全部</option>
              <option value="unconfirmed">未确认</option>
              <option value="confirmed">已确认</option>
              <option value="pending_adjustment">待调整</option>
              <option value="adjusted">已调整</option>
              <option value="increased">已增报</option>
              <option value="partial_refunded">已部分退费</option>
              <option value="refunded">已退费</option>
            </select>
          </label>
        </div>
        <div class="actions">
          <button id="refreshBtn" type="button">刷新列表</button>
        </div>
      </section>

      <section class="card">
        <h2>报名记录 <a href="./enrollment-stats.html" target="_blank" rel="noopener noreferrer" style="margin-left: 10px;">查看报名统计</a></h2>
        <div id="enrollmentPagination" class="pagination"></div>
        <div id="enrollmentList">加载中...</div>
      </section>
    </main>

    <script src="../assets/js/enrollments.js?v=20260403c"></script>
  </body>
</html>
