<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>老生管理</title>
    <link rel="stylesheet" href="../assets/css/styles.css?v=20260331c" />
  </head>
  <body>
    <header class="topbar">
      <div class="topbar-main">
        <h1>老生管理</h1>
        <nav class="topbar-links">
          <a href="../index.html" target="_blank" rel="noopener noreferrer">返回主页</a>
          <a href="./enrollments.html" target="_blank" rel="noopener noreferrer">报价管理</a>
          <a href="./accommodations.html" target="_blank" rel="noopener noreferrer">住宿报名</a>
          <a href="./accommodation-management.html" target="_blank" rel="noopener noreferrer">住宿管理</a>
          <a href="./refunds.html" target="_blank" rel="noopener noreferrer">报名调整</a>
        </nav>
      </div>
      <div class="operator-box">
        <label for="operator">操作员</label>
        <select id="operator">
          <option value="">加载中...</option>
        </select>
        <label for="source">来源</label>
        <select id="source">
          <option value="">加载中...</option>
        </select>
      </div>
    </header>

    <main class="layout">
      <section class="card">
        <h2>查询老生</h2>
        <div class="field-grid two-col">
          <label>
            关键词
            <input id="searchKeyword" type="text" placeholder="姓名/年级/手机号尾号" />
          </label>
          <label>
            年级（可选）
            <input id="searchGrade" type="text" placeholder="例如：新高二暑期" />
          </label>
        </div>
        <div class="actions">
          <button id="searchBtn" type="button">查询</button>
          <button id="resetBtn" type="button" class="secondary">清空并刷新</button>
        </div>
      </section>

      <section class="card">
        <h2>手动新增老生</h2>
        <form id="createForm">
          <div class="field-grid two-col">
            <label>
              老生姓名
              <input id="newName" type="text" placeholder="必填" required />
            </label>
            <label>
              年级
              <input id="newGrade" type="text" placeholder="可选" />
            </label>
            <label>
              手机号尾号
              <input id="newPhoneSuffix" type="text" maxlength="20" placeholder="可选，最多20位" />
            </label>
            <label>
              备注
              <input id="newNote" type="text" placeholder="可选" />
            </label>
          </div>
          <div class="actions">
            <button id="createBtn" type="submit">新增老生</button>
          </div>
        </form>
      </section>

      <section class="card">
        <h2>老生列表</h2>
        <div id="historyPagination" class="pagination"></div>
        <div id="historyList">加载中...</div>
      </section>
    </main>

    <script src="../assets/js/old-students.js?v=20260331c"></script>
  </body>
</html>
