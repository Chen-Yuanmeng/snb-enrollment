<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>报名调整页面</title>
    <link rel="stylesheet" href="../assets/css/styles.css?v=20260327b" />
  </head>
  <body>
    <header class="topbar">
      <div class="topbar-main">
        <h1>报名调整页面</h1>
        <nav class="topbar-links">
          <a href="../index.html" target="_blank" rel="noopener noreferrer">返回报名页面</a>
          <a href="./accommodations.html" target="_blank" rel="noopener noreferrer">住宿报名页面</a>
          <a href="./accommodation-management.html" target="_blank" rel="noopener noreferrer">住宿报价确认</a>
          <a href="./accommodation-stats.html" target="_blank" rel="noopener noreferrer">住宿统计</a>
          <a href="./refunds.html" target="_blank" rel="noopener noreferrer">报名调整页面</a>
          <a href="./old-students.html" target="_blank" rel="noopener noreferrer">老生管理页面</a>
        </nav>
      </div>
      <div class="operator-box">
        <label for="operator">操作员</label>
        <select id="operator">
          <option value="">加载中...</option>
        </select>
        <label for="source">来源</label>
        <select id="source">
          <option value="">加载中...</option>
        </select>
      </div>
    </header>

    <main class="layout">
      <section class="card">
        <h2>报名调整信息</h2>
        <form id="refundForm">
          <div class="block compact-block">
            <h3>1. 搜索原报名记录</h3>
            <div class="field-grid two-col">
              <label>
                姓名或报名ID
                <input id="searchKeyword" type="text" placeholder="输入学生姓名或报名ID" />
              </label>
              <label>
                搜索结果
                <select id="searchResultSelect">
                  <option value="">请先搜索</option>
                </select>
              </label>
            </div>
            <div class="actions full-width-action">
              <button id="searchEnrollment" type="button">搜索报名记录</button>
            </div>
          </div>

          <div class="block compact-block">
            <h3>2. 调整后报名信息</h3>
            <input id="originalId" type="number" min="1" required readonly class="hidden" />

            <div class="field-grid two-col">
              <label>
                学生姓名
                <input id="studentName" type="text" placeholder="自动填充后可调整" required />
              </label>
              <label>
                手机号
                <input id="studentPhone" type="text" placeholder="自动填充后可调整" required />
              </label>
              <label>
                年级
                <select id="newGrade"></select>
              </label>
            </div>

            <div class="block compact-block">
              <h3>班型与科目</h3>
              <div id="newClassSubjectWrap"></div>
            </div>

            <div class="block compact-block">
              <h3>上课方式</h3>
              <select id="newClassMode"></select>
              <div id="newMixModeWrap" class="mix-mode hidden"></div>
            </div>

            <div class="block compact-block">
              <h3>优惠活动</h3>
              <div id="newDiscountWrap" class="choice-grid"></div>
              <div id="excellentWrap" class="excellent-wrap hidden"></div>
              <div id="historyWrap" class="history-wrap hidden">
                <p class="hint">老带新需要先搜索并选择老生</p>
                <div class="field-grid">
                  <input id="historyKeyword" type="text" placeholder="输入老带新老生姓名关键词" />
                  <button id="searchHistory" type="button" class="secondary">搜索老带新老生</button>
                </div>
                <label>
                  老带新老生候选
                  <select id="historyStudentSelect">
                    <option value="">未选择</option>
                  </select>
                </label>
              </div>
              <div id="discountNote" class="discount-note"></div>
            </div>
          </div>


          <div class="actions full-width-action">
            <button id="submitRefund" type="button">生成调整通知</button>
          </div>
        </form>
      </section>

      <section class="card">
        <h2>调整通知</h2>
        <pre id="refundResult" class="result">请先搜索原报名并调整参数后生成通知</pre>
      </section>
    </main>

    <script src="../assets/js/refunds.js?v=20260331b"></script>
  </body>
</html>
