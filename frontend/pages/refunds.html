<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>退费页面</title>
    <link rel="stylesheet" href="../assets/css/styles.css?v=20260327b" />
  </head>
  <body>
    <header class="topbar">
      <div class="topbar-main">
        <h1>退费页面</h1>
        <nav class="topbar-links">
          <a href="../index.html" target="_blank" rel="noopener noreferrer">返回报名页面</a>
          <a href="./refunds.html" target="_blank" rel="noopener noreferrer">退费页面</a>
          <a href="./old-students.html" target="_blank" rel="noopener noreferrer">老生管理页面</a>
        </nav>
      </div>
      <div class="operator-box">
        <label for="operator">操作员</label>
        <select id="operator">
          <option value="">加载中...</option>
        </select>
        <label for="source">来源</label>
        <select id="source">
          <option value="">加载中...</option>
        </select>
      </div>
    </header>

    <main class="layout">
      <section class="card">
        <h2>退费信息</h2>
        <form id="refundForm">
          <div class="block compact-block">
            <h3>1. 搜索原报名记录</h3>
            <div class="field-grid two-col">
              <label>
                姓名或报名ID
                <input id="searchKeyword" type="text" placeholder="输入学生姓名或报名ID" />
              </label>
              <label>
                搜索结果
                <select id="searchResultSelect">
                  <option value="">请先搜索</option>
                </select>
              </label>
            </div>
            <div class="actions full-width-action">
              <button id="searchEnrollment" type="button">搜索报名记录</button>
            </div>
          </div>

          <div class="block compact-block">
            <h3>2. 旧报名信息（自动填充）</h3>
            <div class="field-grid two-col">
              <label>
                旧学生姓名
                <input id="oldStudentName" type="text" readonly />
              </label>
              <label>
                旧手机号
                <input id="oldStudentPhone" type="text" readonly />
              </label>
              <label>
                旧年级
                <input id="oldGrade" type="text" readonly />
              </label>
              <label>
                旧报名课程
                <input id="oldClassSubjects" type="text" readonly />
              </label>
            </div>
            <label>
              旧优惠活动
              <textarea id="oldDiscounts" readonly placeholder="搜索后自动展示"></textarea>
            </label>
          </div>

          <div class="block compact-block">
            <h3>3. 调整新报名信息并提交</h3>
          </div>

          <div class="field-grid two-col">
            <label>
              原报名ID
              <input id="originalId" type="number" min="1" required readonly />
            </label>
            <label>
              学生姓名
              <input id="studentName" type="text" placeholder="自动填充后可调整" required />
            </label>
            <label>
              手机号
              <input id="studentPhone" type="text" placeholder="自动填充后可调整" required />
            </label>
            <label>
              新年级
              <select id="newGrade"></select>
            </label>
            <label>
              上课方式
              <select id="newClassMode"></select>
            </label>
            <label>
              复核备注
              <input id="reviewNote" type="text" placeholder="可选" />
            </label>
          </div>

          <label>
            新优惠活动（可编辑，每行一条：优惠名,金额）
            <textarea id="newDiscounts" placeholder="例如:\n五一报名优惠,100\n转介绍优惠,50"></textarea>
          </label>

          <div class="block compact-block">
            <h3>新班型与科目</h3>
            <div id="newClassSubjectWrap"></div>
            <div id="newMixModeWrap" class="mix-mode hidden"></div>
          </div>

          <label>
            兜底手填（可选，每行一个；仅在特殊规则未覆盖时使用）
            <textarea id="newClassSubjects" placeholder="例如:\n英才数学\n英才物理"></textarea>
          </label>

          <div class="actions">
            <button id="previewRefund" type="button">退费预览</button>
            <button id="submitRefund" type="button" class="secondary">提交退费</button>
          </div>
        </form>
      </section>

      <section class="card">
        <h2>结果</h2>
        <pre id="refundResult" class="result">请先填写退费参数</pre>
      </section>
    </main>

    <script src="../assets/js/refunds.js?v=20260327b"></script>
  </body>
</html>
