<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>住宿报名页面</title>
    <link rel="stylesheet" href="../assets/css/styles.css?v=20260331a" />
  </head>
  <body>
    <header class="topbar">
      <div class="topbar-main">
        <h1>住宿报名页面</h1>
        <nav class="topbar-links">
          <a href="../index.html" target="_blank" rel="noopener noreferrer">返回课程报名页面</a>
          <a href="./accommodation-management.html" target="_blank" rel="noopener noreferrer">住宿报价确认</a>
          <a href="./accommodation-stats.html" target="_blank" rel="noopener noreferrer">住宿统计</a>
          <a href="./enrollments.html" target="_blank" rel="noopener noreferrer">课程报价管理</a>
        </nav>
      </div>
      <div class="operator-box">
        <label for="operator">操作员</label>
        <select id="operator">
          <option value="">加载中...</option>
        </select>
        <label for="source">来源</label>
        <select id="source">
          <option value="">加载中...</option>
        </select>
      </div>
    </header>

    <main class="layout">
      <section class="card">
        <h2>住宿报名信息</h2>
        <form id="accommodationForm">
          <div class="block compact-block">
            <h3>关联报价单</h3>
            <div class="field-grid two-col">
              <label>
                搜索关键词
                <input id="relatedKeyword" type="text" placeholder="输入学生姓名或课程报价单ID" />
              </label>
              <label>
                关联报价单
                <select id="relatedEnrollmentId" class="enrollment-select" required>
                  <option value="">请先搜索并选择</option>
                </select>
              </label>
            </div>
            <div class="actions full-width-action">
              <button id="searchRelatedEnrollment" type="button" class="secondary">搜索报价单</button>
            </div>
          </div>

          <div class="block compact-block">
            <h3>酒店</h3>
            <div id="hotelWrap" class="choice-grid grid-3"></div>
          </div>

          <div class="block compact-block">
            <h3>房间类型</h3>
            <div id="roomTypeWrap" class="choice-grid grid-2"></div>
          </div>

          <div id="otherRoomWrap" class="other-room-wrap hidden">
            <div class="field-grid two-col">
              <label>
                其他房型名称
                <input id="otherRoomTypeName" type="text" placeholder="例如：行政套房" />
              </label>
              <label>
                每晚价格
                <input id="manualNightlyPrice" type="number" min="0" step="0.01" placeholder="请输入每晚价格" />
              </label>
            </div>
          </div>

          <div class="block compact-block">
            <h3>时长</h3>
            <div id="durationWrap" class="choice-grid grid-3"></div>
          </div>

          <div class="block compact-block">
            <h3>学生性别</h3>
            <div id="genderWrap" class="choice-grid grid-2"></div>
          </div>

          <div class="block compact-block">
            <h3>备注（可选）  <span><a href="javascript:void(0)" onclick="fillNoteTemplate()">填入同住模板</a></span></h3>
            <label>
              <input id="noteInput" type="text" placeholder="可选" />
            </label>
          </div>

          <div class="actions full-width-action">
            <button type="submit">生成住宿报价并复制</button>
          </div>
        </form>
      </section>

      <section class="card">
        <h2>住宿报价结果</h2>
        <pre id="accommodationResult" class="result">请先填写信息并生成住宿报价</pre>
      </section>
    </main>

    <script src="../assets/js/accommodations.js?v=20260331a"></script>
  </body>
</html>
